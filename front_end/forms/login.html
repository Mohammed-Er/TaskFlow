<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/login.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img src="../logo/logo.png" alt="Logo" class="logo" />
        <ul class="nav-links">
          <p id="login-text">Don't have an account?</p>
          <li><a href="sign.html">Sign Up</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="sign-section">
        <div class="welcome-section">
          <h1 id="welcome">Get Started.</h1>
          <p id="signup-subtitle">Log in to your account.</p>
        </div>
        <form id="sign-form">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            placeholder="Email"
            name="email"
            required
          />
          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            placeholder="Password"
            name="password"
            required
          />
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
    <footer>
      by creatting an account you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </footer>
    <script src="../scripts/login.js"></script>
  </body>
</html>
