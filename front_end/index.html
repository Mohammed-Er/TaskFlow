<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/dashboard.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img src="logo/logo.png" class="logo" alt="Done Logo" />
        <ul class="nav-links" id="nav-links">
          <li id="user-greeting"></li>
          <li><button id="logout-btn">Logout</button></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="todo-section">
        <div class="heading">
          <p class="label">Your Tasks</p>
          <h1 id="count-heading">0 remaining</h1>
        </div>

        <form id="todo-form" class="input-row" autocomplete="off">
          <svg
            class="plus-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <input id="todo-input" type="text" placeholder="Add a task..." />
          <button id="add-btn" type="submit" disabled>Add</button>
        </form>

        <div class="filters">
          <button class="filter-btn active" data-filter="all" type="button">
            All
          </button>
          <button class="filter-btn" data-filter="active" type="button">
            Active
          </button>
          <button class="filter-btn" data-filter="completed" type="button">
            Completed
          </button>
        </div>

        <ul id="todo-list"></ul>

        <div class="footer-row">
          <span id="items-left">0 items left</span>
          <button id="clear-btn" class="hidden" type="button">
            Clear completed
          </button>
        </div>
      </section>
    </main>

    <script src="../front_end/scripts/dashboard.js"></script>
  </body>
</html>
